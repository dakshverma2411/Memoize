name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (leave empty to auto-detect from POM, e.g. 0.1.0-alpha.1)"
        required: false
        type: string
      next_version:
        description: "Next development version (leave empty for auto-increment, e.g. 0.2.0-SNAPSHOT)"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine release version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            RELEASE_VERSION="${{ github.event.inputs.version }}"
          else
            # Strip -SNAPSHOT from current POM version
            CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            RELEASE_VERSION="${CURRENT%-SNAPSHOT}"
          fi
          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $RELEASE_VERSION"

      - name: Determine next development version
        id: next
        run: |
          if [ -n "${{ github.event.inputs.next_version }}" ]; then
            NEXT_VERSION="${{ github.event.inputs.next_version }}"
          else
            # Auto-increment: bump the last numeric segment
            RELEASE="${{ steps.version.outputs.release }}"
            # Handle versions like 0.1.0, 0.1.0-alpha.1, 1.2.3, etc.
            # Split on dots and hyphens, increment last number
            if [[ "$RELEASE" =~ ^([0-9]+\.[0-9]+\.)([0-9]+)(.*) ]]; then
              PREFIX="${BASH_REMATCH[1]}"
              PATCH="${BASH_REMATCH[2]}"
              SUFFIX="${BASH_REMATCH[3]}"
              NEXT_PATCH=$((PATCH + 1))
              NEXT_VERSION="${PREFIX}${NEXT_PATCH}${SUFFIX}-SNAPSHOT"
            else
              # Fallback: just append -SNAPSHOT
              NEXT_VERSION="${RELEASE}-SNAPSHOT"
            fi
          fi
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next development version: $NEXT_VERSION"

      - name: Set release version in POMs
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.release }} -DgenerateBackupPoms=false

      - name: Build and verify
        run: mvn -B clean verify

      - name: Commit release version on develop
        run: |
          git add -A
          git commit -m "release: v${{ steps.version.outputs.release }}"

      - name: Push release to main
        run: |
          git push origin HEAD:main --force-with-lease

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.release }}"
          git push origin "v${{ steps.version.outputs.release }}"

      - name: Deploy to Maven Central
        run: mvn -B deploy -DskipTests -P release
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release }}
          name: v${{ steps.version.outputs.release }}
          generate_release_notes: true
          target_commitish: main

      - name: Bump develop to next snapshot
        run: |
          mvn -B versions:set -DnewVersion=${{ steps.next.outputs.next }} -DgenerateBackupPoms=false
          git add -A
          git commit -m "chore: bump to ${{ steps.next.outputs.next }} [skip ci]"
          git push origin HEAD:develop
