name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0-alpha.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: mvn -B versions:set -DnewVersion=${{ github.event.inputs.version }} -DgenerateBackupPoms=false

      - name: Build and verify
        run: mvn -B clean verify

      - name: Commit version
        run: git commit -am "release: v${{ github.event.inputs.version }}"

      - name: Create tag
        run: git tag v${{ github.event.inputs.version }}

      - name: Deploy to Maven Central
        run: mvn -B deploy -DskipTests -P release
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true

      - name: Bump to next snapshot
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Simple: just append -SNAPSHOT to current version for now
          # Maintainer should set the correct next version manually if needed
          echo "NEXT_VERSION=${VERSION}-SNAPSHOT" >> $GITHUB_ENV

      - name: Set next snapshot version
        run: mvn -B versions:set -DnewVersion=${{ env.NEXT_VERSION }} -DgenerateBackupPoms=false

      - name: Commit and push
        run: git commit -am "chore: bump to ${{ env.NEXT_VERSION }}" && git push origin main --tags
