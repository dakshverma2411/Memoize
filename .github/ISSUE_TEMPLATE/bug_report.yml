name: Bug Report
description: Report a bug in Memoize
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true
  - type: dropdown
    id: memoize-version
    attributes:
      label: Memoize Version
      options:
        - 0.1.0-alpha.1-SNAPSHOT
        - 0.1.0-alpha.1
    validations:
      required: true
  - type: dropdown
    id: java-version
    attributes:
      label: Java Version
      options:
        - "17"
        - "21"
        - Other
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
